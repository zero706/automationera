<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Fond arrondi -->
  <rect width="32" height="32" rx="6" ry="6" fill="#0E0E0E"/>

  <!-- Jambe gauche du A -->
  <line x1="16" y1="4" x2="4" y2="27" stroke="#F07030" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Jambe droite du A -->
  <line x1="16" y1="4" x2="28" y2="27" stroke="#F07030" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Barre transversale (à ~62% de la hauteur) -->
  <!-- y = 4 + 0.62*23 = 18.3, left x = 16-(12*0.62)=8.6, right x = 16+(12*0.62)=23.4 -->
  <line x1="8" y1="18" x2="24" y2="18" stroke="#F07030" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Éclair blanc (centré dans le A) -->
  <path d="M17,7 L12.5,18.5 L16,17.5 L14.5,26 L20,17 L16.5,18 Z" fill="white"/>

  <!-- Point antenne -->
  <circle cx="16" cy="2.5" r="1.5" fill="#F07030" opacity="0.8"/>
</svg>