<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 175 42" width="175" height="42">
  <!-- A left leg -->
  <line x1="20" y1="3" x2="5" y2="40" stroke="#F07030" stroke-width="2.8" stroke-linecap="round"/>
  <!-- A right leg -->
  <line x1="20" y1="3" x2="35" y2="40" stroke="#F07030" stroke-width="2.8" stroke-linecap="round"/>
  <!-- A crossbar -->
  <line x1="10" y1="25" x2="30" y2="25" stroke="#F07030" stroke-width="2.3" stroke-linecap="round"/>

  <!-- Base short extensions -->
  <line x1="5" y1="40" x2="2" y2="40" stroke="#F07030" stroke-width="2.3" stroke-linecap="round"/>
  <line x1="35" y1="40" x2="38" y2="40" stroke="#F07030" stroke-width="2.3" stroke-linecap="round"/>

  <!-- Circuit traces -->
  <line x1="2" y1="40" x2="0" y2="40" stroke="#F07030" stroke-width="1.2" opacity="0.65"/>
  <line x1="0" y1="40" x2="0" y2="44" stroke="#F07030" stroke-width="1.2" opacity="0.65"/>
  <circle cx="0" cy="44" r="1.3" fill="#F07030" opacity="0.65"/>
  <line x1="38" y1="40" x2="40" y2="40" stroke="#F07030" stroke-width="1.2" opacity="0.65"/>
  <line x1="40" y1="40" x2="40" y2="44" stroke="#F07030" stroke-width="1.2" opacity="0.65"/>
  <circle cx="40" cy="44" r="1.3" fill="#F07030" opacity="0.65"/>

  <!-- Antenna top -->
  <line x1="20" y1="1" x2="20" y2="3" stroke="#F07030" stroke-width="1.4" opacity="0.75"/>
  <circle cx="20" cy="0" r="1.5" fill="#F07030" opacity="0.75"/>

  <!-- Lightning bolt (white) -->
  <path d="M21,8 L15,26 L20,24 L18,37 L26,23 L21,25 Z" fill="white"/>

  <!-- AUTOMATION text -->
  <text x="52" y="22"
    font-family="Arial Black, Helvetica Neue, sans-serif"
    font-weight="900" font-size="13" fill="white" letter-spacing="1.2">AUTOMATION</text>

  <!-- ERA text -->
  <text x="52" y="37"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="700" font-size="10.5" fill="#F07030" letter-spacing="4">ERA</text>
</svg>